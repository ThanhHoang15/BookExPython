{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Layout Example</title>

    <link rel="stylesheet" href="{% static 'main.css' %}">
    <link rel="stylesheet" href="{% static 'table_format.css' %}">
    <link rel="stylesheet" href="{% static 'message_box.css' %}">
</head>

<body>

<!-- top right login -->
<div class="top-right">
    {% if user.is_authenticated %}
        {{ user.username }}
        <form action="{% url 'logout' %}?next=/" method="post">
            {% csrf_token %}
            <button type="submit">logout</button>
        </form>
    {% else %}
        Not Logged in
        <a href="{% url 'login' %}?next=/">login</a>
    {% endif %}
</div>

<!-- banner -->
<header class="banner">
    <h1>Banner</h1>

    <!-- hamburger -->
    <button class="hamburger" onclick="toggleMenu()">☰</button>
</header>

<!-- main layout -->
<div class="container">

    <!-- sidebar -->
    <nav class="menu" id="sideMenu">
        <ul>
            {% block sidenav %}
            {% endblock %}
        </ul>
    </nav>

    <!-- content -->
    <main class="content">
        <div class="page-box">
            {% block content %}
            {% endblock %}
        </div>
    </main>

</div>

<!-- footer -->
<footer class="footer">
    <p>© 2026 Your Name</p>
</footer>

<!-- JS -->
<script>
function toggleMenu() {
    const menu = document.getElementById("sideMenu");
    menu.classList.toggle("show");
}
</script>

</body>
</html>
