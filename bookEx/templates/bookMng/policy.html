{% extends "base.html" %}
{% load static %}

{% block sidenav %}
   {% for item in item_list %}
      <li>
        <a href="{{ item.link }}">{{ item.item }}</a>
      </li>
   {% endfor %}
{% endblock sidenav %}

{% block content %}
<div class="about-container">
    <h1>{{ title }}</h1>
    <p style="white-space: pre-line;">
        {{ content }}
    </p>
</div>
{% endblock content %}
